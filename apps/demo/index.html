<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpDICOM — demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: #0c0e12;
        color: #e6e6e6;
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid #222;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
      }
      header .tag {
        font-size: 12px;
        color: #8a93a0;
      }
      main {
        height: calc(100vh - 50px);
      }
      opdicom-viewer {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OpDICOM</h1>
      <span class="tag">modern DICOM web viewer · demo</span>
      <button id="sample" type="button">Load sample</button>
      <button id="sample3d" type="button">Load 3D (MPR)</button>
      <input id="file" type="file" accept=".dcm,application/dicom" multiple />
    </header>
    <main>
      <opdicom-viewer id="viewer"></opdicom-viewer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
