packages:
  - "packages/*"
  - "apps/*"
allowBuilds:
  core-js-pure: false
  esbuild: true

# Security: force patched versions of transitive dependencies flagged by audit.
overrides:
  "js-yaml@<3.14.2": ">=3.14.2 <4"
  "js-yaml@4": ">=4.1.2"
  "uuid@<11.1.1": ">=11.1.1"
  "esbuild@>=0.27.3 <0.28.1": ">=0.28.1"
